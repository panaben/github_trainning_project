name: Check OpenAI Secret (safe)

on:
  workflow_dispatch: {}
  # PR の場合は fork だと secrets が使えない点に注意:
  # pull_request:    # ← 必要なら有効化。ただし fork PR は secrets を参照できない。

jobs:
  check-openai:
    runs-on: ubuntu-latest
    steps:
      - name: Show minimal runner info
        run: |
          echo "Runner: $(uname -a)"
      - name: Check OPENAI_API_KEY exists (fail if not)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "ERROR: OPENAI_API_KEY is NOT set in this repository's secrets."
            exit 1
          fi
          echo "OPENAI_API_KEY exists (value hidden)."
      - name: Install jq for JSON parsing
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Call OpenAI models endpoint (safe summary)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            https://api.openai.com/v1/models || echo "000")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            COUNT=$(jq '.data | length' response.json)
            echo "OK: OpenAI API reachable. Model count: $COUNT"
          else
            echo "Failed to call OpenAI API. Response (first 300 chars):"
            head -c 300 response.json || true
            exit 1
          fi
